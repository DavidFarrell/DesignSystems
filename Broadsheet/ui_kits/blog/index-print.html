<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>thingsithinkithink — Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="../../fonts.css"/>
<link rel="stylesheet" href="../../src/tokens.css"/>
<link rel="stylesheet" href="../../src/components.css"/>
<style>
  @page { size: A4 portrait; margin: 0; }
  html, body { margin: 0; padding: 0; background: var(--v6-paper); }
  body {
    background-image: radial-gradient(var(--v6-paper-tooth) 1px, transparent 1px);
    background-size: var(--v6-paper-tooth-size) var(--v6-paper-tooth-size);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  /* each "screen" is its own page */
  .print-page {
    width: 210mm;
    min-height: 297mm;
    box-sizing: border-box;
    page-break-after: always;
    break-after: page;
  }
  .print-page:last-child { page-break-after: auto; break-after: auto; }
  /* shrink the .v6-frame margins for A4 */
  .print-page .v6-frame { margin: 12mm; }
  .print-page .v6-frame__inner { padding: 18mm 14mm; }
  /* nav doesn't make sense in print — render as plain row, not interactive */
  .print-nav {
    display: flex; justify-content: center; gap: 18px;
    margin: 8px 0 22px;
    font-family: var(--v6-font-display-sc);
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--v6-ink-mute);
  }
  .print-nav .current { color: var(--v6-accent); border-bottom: 1px solid var(--v6-accent); padding-bottom: 2px; }
  .print-nav .sep { color: var(--v6-ink-faint); }

  @media print {
    /* hide anything we explicitly mark out */
    [data-no-print] { display: none !important; }
    a { color: var(--v6-ink) !important; text-decoration: none; border-bottom: 1px dotted var(--v6-ink); }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="v6">
  <div id="root"></div>

  <script type="text/babel" src="Frame.jsx"></script>
  <script type="text/babel" src="Masthead.jsx"></script>
  <script type="text/babel" src="Title.jsx"></script>
  <script type="text/babel" src="Plate.jsx"></script>
  <script type="text/babel" src="Body.jsx"></script>
  <script type="text/babel" src="Bits.jsx"></script>
  <script type="text/babel" src="IndexCard.jsx"></script>

  <script type="text/babel">
    const POSTS = [
      { id: "balloon", chapter: "CHAPTER THE FIRST", title: "On Balloon Animals",
        dek: "in which the author considers a question of moment",
        date: "2026-02-15", read: "6 MIN READ",
        gradient: "linear-gradient(135deg, #c8b89a 0%, #a89878 60%, #d8cfb8 100%)" },
      { id: "ragged", chapter: "CHAPTER THE SECOND", title: "Like a Ragged Prayer",
        dek: "in which the author considers what the romance novelists know that we do not",
        date: "2026-03-02", read: "11 MIN READ",
        gradient: "linear-gradient(160deg, #b8a888 0%, #d4c8a8 100%)" },
      { id: "weather", chapter: "CHAPTER THE THIRD", title: "A Curious Weather",
        dek: "in which a city is described from the wrong end of a telescope",
        date: "2026-03-21", read: "4 MIN READ",
        gradient: "linear-gradient(120deg, #cfc4a8 0%, #b0a080 100%)" },
    ];

    function StaticNav({ current }) {
      const items = [
        { id: "index", label: "INDEX" },
        { id: "post", label: "CHAPTER THE FIRST" },
        { id: "about", label: "FRONTISPIECE" },
      ];
      return (
        <div className="print-nav">
          {items.map((it, i) => (
            <span key={it.id}>
              {i > 0 && <span className="sep" style={{marginRight:18}}>·</span>}
              <span className={current === it.id ? "current" : ""}>{it.label}</span>
            </span>
          ))}
        </div>
      );
    }

    function IndexPage() {
      return (
        <div className="print-page">
          <Frame>
            <Masthead chapter="THE INDEX" date="2026 · ISSUE I" read="GLASGOW EDITION" />
            <StaticNav current="index" />
            <h1 className="v6-title" style={{ fontSize: 56, marginTop: 12 }}>The Index</h1>
            <p className="v6-dek">— a register of all chapters now in circulation —</p>
            <div className="v6-byline" style={{ marginBottom: 28 }}>
              <div className="v6-byline__rule"></div>
              <div className="v6-byline__text">EDITED · BOUND · PRINTED BY THE AUTHOR</div>
              <div className="v6-byline__rule"></div>
            </div>
            <div className="v6-broadsheet" style={{ columnFill: "balance" }}>
              {POSTS.map((p) => <IndexCard key={p.id} {...p} />)}
              <article style={{ breakInside: "avoid", marginBottom: 24 }}>
                <h3 style={{
                  fontFamily: "var(--v6-font-display-sc)", fontSize: 11, letterSpacing: 5,
                  color: "var(--v6-accent)", textAlign: "center", margin: "0 0 8px",
                }}>FROM THE FRONTISPIECE</h3>
                <p style={{
                  fontFamily: "var(--v6-font-body)", fontSize: 14, lineHeight: 1.5,
                  textAlign: "justify", hyphens: "auto", margin: 0,
                }}>
                  This is a journal kept against forgetting. The chapters published here
                  were written between February and the present, in the small hours, and
                  in a hand that was not always patient with itself.
                </p>
              </article>
            </div>
          </Frame>
        </div>
      );
    }

    function PostPage() {
      const post = POSTS[0];
      return (
        <div className="print-page">
          <Frame>
            <Masthead chapter={post.chapter} date={post.date} read={post.read} />
            <StaticNav current="post" />
            <Title title={post.title} dek={post.dek} by="DAVID GÉROUVILLE-FARRELL" date={post.date} />
            <Plate hero caption="Plate the First. Drawn from the life." gradient={post.gradient} />
            <Motto>{post.title.toUpperCase()}</Motto>
            <Body>
              <p>Romance has always been a high-output genre — prolific writers publish multiple books a year. But one writer profiled in the piece, Coral Hart, has gone from about ten books a year to over two hundred, using AI across <a href="#">twenty-one different pen names</a>. The arithmetic is staggering and the prose, by all accounts, is no worse than it was.</p>
              <p>One of the writers describes herself as less of a writer now and "more of a director, a creator." She comes up with the plots and the characters, but she does not think of herself as the author anymore.</p>
              <H2>Not the reaction you'd expect</H2>
              <p>The reaction in literary circles, naturally, has been one of low fury. The reaction in the romance reading communities has been entirely different — a mild, practical interest in whether the books continue to deliver what they promised, which is a particular shape of feeling at a reliable pace.</p>
              <Quote>It is a system rule, not a recommendation. Posts are always single-column.</Quote>
            </Body>
            <EndMark chapter={post.chapter} />
          </Frame>
        </div>
      );
    }

    function AboutPage() {
      return (
        <div className="print-page">
          <Frame>
            <Masthead chapter="FRONTISPIECE" date="ABOUT THE AUTHOR" read="A DEDICATION" />
            <StaticNav current="about" />
            <h1 className="v6-title" style={{ fontSize: 64 }}>D. Gérouville-Farrell</h1>
            <p className="v6-dek" style={{ fontSize: 20 }}>
              — kept this journal because he could not be persuaded that anything else would do —
            </p>
            <div style={{ maxWidth: 480, margin: "28px auto 24px" }}>
              <Plate
                caption="The author, drawn from the life. Engraved by another hand."
                gradient="radial-gradient(circle at 40% 35%, #c8b89a 0%, #8a7a5a 60%, #2a2218 100%)"
              />
            </div>
            <div style={{
              fontFamily: "var(--v6-font-body)", fontStyle: "italic",
              fontSize: 19, lineHeight: 1.5, textAlign: "center",
              maxWidth: 520, margin: "0 auto 32px",
            }}>
              This blog is a journal kept against forgetting. The chapters are written in
              the small hours, in a hand not always patient with itself, and set here in
              the form of a Glaswegian broadsheet of the imagination.
            </div>
            <div style={{
              textAlign: "center",
              fontFamily: "var(--v6-font-display-sc)",
              fontSize: 11, letterSpacing: 5, color: "var(--v6-ink-mute)",
            }}>
              ❦ &nbsp; CORRESPONDENCE: MASTODON · BLUESKY · RSS &nbsp; ❦
            </div>
          </Frame>
        </div>
      );
    }

    function PrintApp() {
      return (
        <>
          <IndexPage />
          <PostPage />
          <AboutPage />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PrintApp />);

    // auto-print after fonts + JSX have loaded
    (async () => {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
      setTimeout(() => window.print(), 800);
    })();
  </script>
</body>
</html>
