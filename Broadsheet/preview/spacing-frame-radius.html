<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 18px;">
    <div>
      <div class="label-sc">FRAME — DOUBLE ENGRAVED</div>
      <div style="margin-top:10px; border: 2px solid var(--v6-ink); padding: 3px;">
        <div style="border: 1px solid var(--v6-ink); padding: 22px 28px; position:relative; min-height: 90px;">
          <span style="position:absolute; top:6px; left:6px; font-family: var(--v6-font-display); font-size:14px; opacity:.7;">❦</span>
          <span style="position:absolute; top:6px; right:6px; font-family: var(--v6-font-display); font-size:14px; opacity:.7;">❦</span>
          <span style="position:absolute; bottom:6px; left:6px; font-family: var(--v6-font-display); font-size:14px; opacity:.7;">❦</span>
          <span style="position:absolute; bottom:6px; right:6px; font-family: var(--v6-font-display); font-size:14px; opacity:.7;">❦</span>
          <div style="text-align:center; font-family: var(--v6-font-display-sc); letter-spacing: 5px; font-size: 12px;">CONTENT</div>
        </div>
      </div>
      <div class="mono" style="margin-top:8px;">2px outer · 3px gap · 1px inner · ❦ corners @ 8px.</div>
    </div>
    <div>
      <div class="label-sc">RADIUS · SHADOWS</div>
      <div class="mono" style="margin-top:10px;"><b>--v6-radius: 0</b><br>Always 0. Never round anything.<br><br><b>box-shadow: none</b><br>No shadows. Depth comes from frames and ink weight, not light.</div>
    </div>
  </div>
</div></body></html>
