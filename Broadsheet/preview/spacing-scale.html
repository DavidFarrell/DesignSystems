<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(9, 1fr); gap: 8px; align-items:end;">
    <div><div style="height:4px; background: var(--v6-accent);"></div><div class="mono" style="margin-top:4px">space-1<br>4</div></div>
    <div><div style="height:8px; background: var(--v6-accent);"></div><div class="mono" style="margin-top:4px">space-2<br>8</div></div>
    <div><div style="height:12px; background: var(--v6-accent);"></div><div class="mono" style="margin-top:4px">space-3<br>12</div></div>
    <div><div style="height:18px; background: var(--v6-accent);"></div><div class="mono" style="margin-top:4px">space-4<br>18</div></div>
    <div><div style="height:24px; background: var(--v6-accent);"></div><div class="mono" style="margin-top:4px">space-5<br>24</div></div>
    <div><div style="height:36px; background: var(--v6-accent);"></div><div class="mono" style="margin-top:4px">space-6<br>36</div></div>
    <div><div style="height:48px; background: var(--v6-accent);"></div><div class="mono" style="margin-top:4px">space-7<br>48</div></div>
    <div><div style="height:64px; background: var(--v6-accent);"></div><div class="mono" style="margin-top:4px">space-8<br>64</div></div>
    <div><div style="height:96px; background: var(--v6-accent);"></div><div class="mono" style="margin-top:4px">space-9<br>96</div></div>
  </div>
  <div class="mono" style="margin-top:10px;">4px base · all spacing snaps to this scale.</div>
</div></body></html>
