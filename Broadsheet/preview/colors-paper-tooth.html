<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex; gap:14px; align-items:flex-start;">
    <div style="flex:1; padding:14px; background: var(--v6-paper); background-image: radial-gradient(var(--v6-paper-tooth) 1px, transparent 1px); background-size: 3px 3px; border:1px solid var(--v6-ink);">
      <div class="label-sc">PAPER + TOOTH</div>
      <div class="mono" style="margin-top:6px">3px radial-dot speckle<br>rgba(60,40,20,0.05)</div>
    </div>
    <div style="flex:1; padding:14px; background: var(--v6-paper); border:1px solid var(--v6-ink);">
      <div class="label-sc">PAPER, NO TOOTH</div>
      <div class="mono" style="margin-top:6px">DON'T USE — looks flat</div>
    </div>
  </div>
  <div class="mono" style="margin-top:10px;">The tooth is the system. Apply via <b>background-image: radial-gradient(...)</b> on every page.</div>
</div></body></html>
