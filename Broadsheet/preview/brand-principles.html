<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
    <div style="border:1px solid var(--v6-ink); padding:10px; background: rgba(255,255,255,0.4);">
      <div class="label-sc" style="margin-bottom: 6px;">FRAME PAGE</div>
      <div class="mono">Every screen sits inside a double engraved border with corner ornaments.</div>
    </div>
    <div style="border:1px solid var(--v6-ink); padding:10px; background: rgba(255,255,255,0.4);">
      <div class="label-sc" style="margin-bottom: 6px;">ONE COLUMN</div>
      <div class="mono">Posts are single-column "chapters." 3-col is reserved for the index.</div>
    </div>
    <div style="border:1px solid var(--v6-ink); padding:10px; background: rgba(255,255,255,0.4);">
      <div class="label-sc" style="margin-bottom: 6px;">PLATE · MOTTO · CAP</div>
      <div class="mono">These three carry the voice. Don't substitute icons or color blocks.</div>
    </div>
  </div>
</div></body></html>
