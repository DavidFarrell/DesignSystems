<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 14px;">
    <div style="border:1px solid var(--v6-ink); padding:10px;">
      <div class="label-sc" style="color: var(--v6-accent);">POST MODE</div>
      <div style="margin-top:8px; height:90px; border: 2px solid var(--v6-ink); padding: 3px;">
        <div style="border: 1px solid var(--v6-ink); width:100%; height:100%; display:flex; justify-content:center; align-items:center;">
          <div style="width:50%; background: var(--v6-ink-thread); height: 60%;"></div>
        </div>
      </div>
      <div class="mono" style="margin-top:8px;">680px reading column · single col · drop cap.</div>
    </div>
    <div style="border:1px solid var(--v6-ink); padding:10px;">
      <div class="label-sc" style="color: var(--v6-accent);">HOMEPAGE MODE</div>
      <div style="margin-top:8px; height:90px; border: 2px solid var(--v6-ink); padding: 3px;">
        <div style="border: 1px solid var(--v6-ink); width:100%; height:100%; display:grid; grid-template-columns: 1fr 1fr 1fr; gap:6px; padding:8px; box-sizing:border-box;">
          <div style="background: var(--v6-ink-thread);"></div>
          <div style="background: var(--v6-ink-thread); border-left:1px solid var(--v6-ink); border-right:1px solid var(--v6-ink); margin: 0 -3px;"></div>
          <div style="background: var(--v6-ink-thread);"></div>
        </div>
      </div>
      <div class="mono" style="margin-top:8px;">3-col broadsheet · index ONLY · 1px ink rule.</div>
    </div>
  </div>
</div></body></html>
