<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;">
    <div>
      <div class="label-sc">DISPLAY</div>
      <div style="font-family: var(--v6-font-display); font-size: 40px; line-height: 1.04; margin: 6px 0;">IM Fell English</div>
      <div class="mono">titles · drop caps · ornaments</div>
    </div>
    <div>
      <div class="label-sc">SMALL CAPS</div>
      <div style="font-family: var(--v6-font-display-sc); font-size: 28px; letter-spacing: 2px; margin: 6px 0;">IM FELL SC</div>
      <div class="mono">labels · mottos · chapters</div>
    </div>
    <div>
      <div class="label-sc">BODY</div>
      <div style="font-family: var(--v6-font-body); font-size: 36px; margin: 6px 0;">Cormorant</div>
      <div class="mono">prose · captions (italic)</div>
    </div>
  </div>
  <div class="mono" style="margin-top:14px;"><b>+ JetBrains Mono</b> — code only. Never UI labels.</div>
</div></body></html>
