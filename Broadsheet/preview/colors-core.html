<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="grid grid--4">
    <div>
      <div class="swatch" style="background: var(--v6-paper); background-image: radial-gradient(var(--v6-paper-tooth) 1px, transparent 1px); background-size: 3px 3px;"></div>
      <div class="mono" style="margin-top:6px"><b>--v6-paper</b><br>#efe7d3 + tooth</div>
    </div>
    <div>
      <div class="swatch" style="background: var(--v6-ink);"></div>
      <div class="mono" style="margin-top:6px"><b>--v6-ink</b><br>#1a1612</div>
    </div>
    <div>
      <div class="swatch" style="background: var(--v6-accent);"></div>
      <div class="mono" style="margin-top:6px"><b>--v6-accent</b><br>#7a1f1a oxblood</div>
    </div>
    <div>
      <div class="swatch" style="background: var(--v6-plate-bg); filter: var(--v6-plate-tint);"></div>
      <div class="mono" style="margin-top:6px"><b>--v6-plate-bg</b><br>#d8cfb8 + sepia</div>
    </div>
  </div>
</div></body></html>
