<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>GOSH - Palette card</title>
<link rel="stylesheet" href="../fonts.css">
<link rel="stylesheet" href="../src/tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 40px; }
  .card { max-width: 720px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid var(--gosh-paper-rule); }
  h1 { font-size: 28px; margin: 0 0 8px; }
  .strip { display: flex; height: 80px; margin: 24px 0; }
  .strip > div { flex: 1; display: flex; align-items: flex-end; padding: 8px; font-family: monospace; font-size: 11px; }
</style>
</head><body>
<div class="card">
  <p class="gosh-eyebrow">PALETTE</p>
  <h1>The GOSH rainbow, anchored in purple</h1>
  <p>Use one accent per surface. Cyan and lime are the workhorses; purple is the anchor; pink is for warmth.</p>
  <div class="strip">
    <div style="background:#2F1351;color:#fff">#2F1351</div>
    <div style="background:#4C3C90;color:#fff">#4C3C90</div>
    <div style="background:#0AD7FF">#0AD7FF</div>
    <div style="background:#E3F30C">#E3F30C</div>
    <div style="background:#EF7A97">#EF7A97</div>
    <div style="background:#FAF9F8;color:#212121">#FAF9F8</div>
    <div style="background:#212121;color:#fff">#212121</div>
  </div>
</div>
</body></html>
