<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 32px">
<div style="display:grid;grid-template-columns:200px 1fr;border:1px solid var(--v2-ink);height:160px">
  <div style="background:var(--v2-ink);color:var(--v2-paper);padding:14px;font-family:var(--v2-font-mono);font-size:11px;letter-spacing:1px">
    <div style="color:#888">RAIL</div>
    <div style="margin-top:6px;color:#cfcfca">260 px<br>fixed<br>dark</div>
  </div>
  <div style="padding:14px;position:relative">

    <div style="border-left:1px dashed var(--v2-accent);border-right:1px dashed var(--v2-accent);position:absolute;top:14px;bottom:14px;left:68px;right:68px;display:flex;align-items:center;justify-content:center;font-family:var(--v2-font-mono);font-size:11px;color:var(--v2-accent);letter-spacing:1px">READING · MAX 760px</div>
  </div>
