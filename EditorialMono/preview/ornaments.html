<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:center;height:100%">
  <div style="text-align:center">
    <div style="font-family:var(--v2-font-serif);font-size:72px;color:var(--v2-accent);line-height:1">§</div>
    <div class="card-token" style="margin-top:6px"><b>Section mark</b><br>opens every H2</div>
  </div>
  <div style="text-align:center">
    <div style="font-size:56px;color:var(--v2-accent);line-height:1">●</div>
    <div class="card-token" style="margin-top:6px"><b>Published dot</b><br>eyebrow strip only</div>
  </div>
  <div style="text-align:center">
    <div style="font-family:var(--v2-font-mono);font-size:14px;color:var(--v2-ink-mute);letter-spacing:.4px;padding-top:30px">FIG · caption</div>
    <div class="card-token" style="margin-top:18px"><b>Caption stamp</b><br>every figure carries it</div>
  </div>
</div>
</body></html>
