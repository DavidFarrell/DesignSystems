<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="background:var(--v2-paper)">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;height:100%">
  <div style="border:1px solid var(--v2-ink);background:#fff;padding:18px">
    <div style="font-family:var(--v2-font-mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;background:var(--v2-ink);color:var(--v2-paper);display:inline-block;margin-bottom:10px">DO</div>
    <div class="card-token" style="line-height:1.55">Vermilion for §, drop cap, link underline. Three places, no more.</div>
    <div class="card-token" style="line-height:1.55;margin-top:6px">Square corners. Hairline rules. Empty space.</div>
  </div>
  <div style="border:1px solid var(--v2-accent);background:#fff5f3;padding:18px">
    <div style="font-family:var(--v2-font-mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;background:var(--v2-accent);color:#fff;display:inline-block;margin-bottom:10px">DON'T</div>
    <div class="card-token" style="line-height:1.55">No vermilion buttons / banners / "important" backgrounds.</div>
    <div class="card-token" style="line-height:1.55;margin-top:6px">No rounding. No drop shadows. No fourth font. No icon set.</div>
  </div>
</div>
</body></html>
