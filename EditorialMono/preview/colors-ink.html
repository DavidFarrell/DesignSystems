<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:0">

  <div style="background:#0f0f0e;padding:14px;display:flex;flex-direction:column;justify-content:flex-end;border-right:1px solid var(--v2-paper)">
    <div class="card-token" style="color:#888"><b style="color:#fff">--v2-ink</b><br><span style="color:#cfcfca">#0f0f0e</span><br><span>primary type · rules</span></div>
  </div>
  <div style="background:#1d1d1b;padding:14px;display:flex;flex-direction:column;justify-content:flex-end;border-right:1px solid var(--v2-paper)">
    <div class="card-token" style="color:#888"><b style="color:#fff">--v2-ink-soft</b><br><span style="color:#cfcfca">#1d1d1b</span><br><span>body prose</span></div>
  </div>
  <div style="background:#6b6b66;padding:14px;display:flex;flex-direction:column;justify-content:flex-end">
    <div class="card-token" style="color:#ddd"><b style="color:#fff">--v2-ink-mute</b><br><span style="color:#fff">#6b6b66</span><br><span>meta · captions</span></div>
  </div>
