<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:0;background:var(--v2-paper)">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;height:170px">
  <div style="background:#f5f3ed;border-right:1px solid var(--v2-ink);padding:14px;display:flex;flex-direction:column;justify-content:flex-end">
    <div class="card-token"><b>--v2-paper</b><br>#f5f3ed<br><span style="color:var(--v2-ink-mute)">page background · warm off-white</span></div>
  </div>
  <div style="background:#ece9e0;border-right:1px solid var(--v2-ink);padding:14px;display:flex;flex-direction:column;justify-content:flex-end">
    <div class="card-token"><b>--v2-paper-2</b><br>#ece9e0<br><span style="color:var(--v2-ink-mute)">inset · blockquote bg</span></div>
  </div>
  <div style="background:#0f0f0e;padding:14px;display:flex;flex-direction:column;justify-content:flex-end">
    <div class="card-token" style="color:#888"><b style="color:#fff">--v2-rail-bg</b><br><span style="color:#cfcfca">#0f0f0e</span><br><span>sidebar rail · code block</span></div>
  </div>
</div>
</body></html>
