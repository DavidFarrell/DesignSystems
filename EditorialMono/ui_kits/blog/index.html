<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thingsithinkithink — UI kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../fonts.css" />
<link rel="stylesheet" href="../../tokens.css" />
<link rel="stylesheet" href="../../components.css" />
<style>
  body { margin: 0; }
  /* Force Inter to load — it's the documented UI fallback for this system. */
  body::after { content: "Inter"; font-family: "Inter"; font-weight: 500; position: absolute; left: -9999px; top: -9999px; visibility: hidden; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="posts.js"></script>
<script type="text/babel" src="Bits.jsx"></script>
<script type="text/babel" src="Rail.jsx"></script>
<script type="text/babel" src="Article.jsx"></script>
<script type="text/babel" src="IndexList.jsx"></script>
<script type="text/babel" src="Archive.jsx"></script>
</head>
<body class="v2">
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function App() {
  const [view, setView] = useState("index");      // index | post | archive | tags | about
  const [slug, setSlug] = useState(null);

  const openPost = (s) => { setSlug(s); setView("post"); window.scrollTo({ top: 0 }); };
  const navigate = (id) => { setView(id); setSlug(null); window.scrollTo({ top: 0 }); };

  const post = view === "post" ? POSTS.find((p) => p.slug === slug) : null;

  return (
    <div className="v2-page" data-screen-label={"01 " + view}>
      <Rail view={view} post={post} navigate={navigate} />
      {view === "index"   && <IndexList openPost={openPost} />}
      {view === "post"    && post && <Article post={post} openPost={openPost} />}
      {view === "archive" && <Archive openPost={openPost} />}
      {view === "tags"    && <Archive openPost={openPost} />}
      {view === "about"   && (
        <article className="v2-article">
          <div className="v2-meta-strip"><span>ABOUT</span><span>EST · 2024</span></div>
          <h1 className="v2-h1">A working notebook.</h1>
          <p className="v2-dek">A studio blog from David Gérouville-Farrell — essays on AI, design, and the craft of software.</p>
          <div className="v2-prose">
            <p>This site is built on the V2 Editorial Mono system. Three families, one accent, sharp corners. The mono carries structure; the serif carries prose. Vermilion is the only voice raised above the page.</p>
            <h2 className="v2-h2"><span>Subscribe</span></h2>
            <p>Lo-fi monthly digest. No tracking, no markdown soup, no AI summaries.</p>
            <div style={{ display: "flex", gap: 12 }}>
              <Button>SUBSCRIBE →</Button>
              <Button ghost>RSS</Button>
            </div>
          </div>
          <EndRule date="2026-02-15" />
        </article>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
